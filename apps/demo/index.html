<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>InsightAI Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button type="button" class="btn btn-primary" id="newChatBtn">+ New chat</button>
      </div>
      <nav class="session-list" id="sessionList" aria-label="Chat history"></nav>
      <div class="sidebar-footer">
        <button type="button" class="btn" id="settingsBtn" style="width:100%">Settings</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button type="button" class="btn btn-icon mobile-menu-btn" id="menuBtn" aria-label="Menu">☰</button>
        <h1 id="chatTitle">InsightAI</h1>
        <div class="topbar-actions"></div>
      </header>

      <div class="messages" id="messages">
        <div class="messages-inner" id="messagesInner">
          <div class="empty-state" id="emptyState">
            <h2>InsightAI</h2>
            <p>Ask about your database or school knowledge base.</p>
          </div>
        </div>
      </div>

      <div class="composer-wrap">
        <form class="composer" id="composer" onsubmit="return false">
          <textarea
            id="composerInput"
            rows="1"
            placeholder="Message InsightAI…"
            aria-label="Message"
          ></textarea>
          <button type="button" class="btn-send" id="sendBtn" aria-label="Send" disabled>↑</button>
        </form>
        <p class="composer-hint">Enter to send · Shift+Enter for new line</p>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="settingsModal" role="dialog" aria-labelledby="settingsTitle">
    <div class="modal">
      <h2 id="settingsTitle">Settings</h2>
      <div class="field">
        <label for="apiUrl">API URL</label>
        <input type="text" id="apiUrl" value="http://localhost:8000" autocomplete="off" />
      </div>
      <div class="field">
        <label for="apiKey">API key (optional)</label>
        <input type="text" id="apiKey" placeholder="Only if API key auth is enabled" autocomplete="off" />
      </div>
      <label class="field-check">
        <input type="checkbox" id="includeSql" />
        Show SQL in answers
      </label>
      <div class="field">
        <label for="mediaBaseUrl">Media base URL (optional)</label>
        <input
          type="text"
          id="mediaBaseUrl"
          placeholder="https://your-app.example.com/media"
          autocomplete="off"
        />
        <p class="field-hint">Prepended to image paths from SQL (e.g. uploads/…)</p>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn" id="settingsClose">Cancel</button>
        <button type="button" class="btn btn-primary" id="settingsSave">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
